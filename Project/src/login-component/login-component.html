<section class="login-page">
  <div class="login-card">
    <h1>Sign In</h1>
    <p class="login-subtitle">Enter your details to continue to your cart.</p>

    <div class="login-form">
      <label for="username">Username</label>
      <input
        id="email"
        [(ngModel)]="username"
        type="username"
        placeholder="Enter your username"
      >

      <label for="password">Password</label>
      <input
        id="password"
        [(ngModel)]="password"
        type="password"
        placeholder="Enter your password"
      >

      <button type="button" class="primary-btn" (click)="login()">Sign In</button>
    </div>
  </div>
</section>
